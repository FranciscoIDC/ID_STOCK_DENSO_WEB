<div class="container-fluid">
    <div class="title-wrapper pt-30">
        <div class="row align-items-center">
            <div class="col-md-6">
                <div class="titlemb-30">
                    <h2>Correos destinatarios</h2>
                </div>
            </div>
            <div class="col-md-6">
                <div class="breadcrumb-wrapper mb-30">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a onclick="history.back()" style="cursor:pointer;">Reporte de incidencias</a></li>
                            <li class="breadcrumb-item active" aria-current="page" style="cursor:pointer;">
                                Correos
                            </li>
                        </ol>
                    </nav>
                </div>
            </div>
        </div>
    </div>
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card-style settings-card-1 mb-30">
                <div class="title mb-30">
                    <!--<h6>Lista de Correos</h6>-->
                </div>
                <div class="profile-info">
                    <div class="row">
                        <div class="col-xxl-12">
                            <div class="input-style-1">
                                <label>Dirección de correo electrónico<span class="required">*</span></label>
                                <input type="text" ng-model="model.Email" />
                            </div>
                        </div>
                        <div class="col-xxl-12">
                            <button class="main-btn primary-btn rounded-full btn-hover w-100" ng-click="Save()">
                                Agregar Correo
                            </button>
                        </div>
                        <div class="col-xxl-12">
                            <div class="card-style clients-table-card mb-30 mt-5">
                                <div class="title d-flex justify-content-between align-items-center">
                                    <h6 class="mb-10">Listado de Correos</h6>
                                    <div class="more-btn-wrapper mb-10">
                                        <button class="more-btn dropdown-toggle" id="moreAction" data-bs-toggle="dropdown" aria-expanded="false" ng-if="editMode">
                                            <i class="lni lni-more-alt"></i>
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="moreAction" style="">

                                            <li class="dropdown-item">
                                                <a class="text-gray" ng-click="RemoveAllEmails()">Eliminar Todos</a>
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                                <div class="table-wrapper table-responsive">
                                    <table class="table">
                                        <tbody>
                                            <tr ng-repeat="email in emailsSelected">
                                                <td class="employee-info">
                                                    <h5 class="text-medium">{{email.Email}}</h5>
                                                    <p><strong>[Correo Adjunto]</p>
                                                </td>
                                                <td>
                                                    <div class="d-flex justify-content-end">
                                                        <button class="status-btn close-btn border-0 m-1" ng-click="RemoveEmail(email.Id)">
                                                            Eliminar
                                                        </button>

                                                    </div>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
