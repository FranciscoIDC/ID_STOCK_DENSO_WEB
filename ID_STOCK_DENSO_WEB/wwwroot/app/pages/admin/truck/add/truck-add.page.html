<div class="container-fluid">
    <!-- ========== title-wrapper start ========== -->
    <div class="title-wrapper pt-30">
        <div class="row align-items-center">
            <div class="col-md-6">
                <div class="titlemb-30">
                    <h2>Tracto</h2>
                </div>
            </div>
            <!-- end col -->
            <div class="col-md-6">
                <div class="breadcrumb-wrapper mb-30">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a onclick="history.back()" style="cursor:pointer;">Tractos</a></li>
                            <li class="breadcrumb-item active" aria-current="page" style="cursor:pointer;">
                                Agregar
                            </li>
                        </ol>
                    </nav>
                </div>
            </div>
            <!-- end col -->
        </div>
        <!-- end row -->
    </div>
    <!-- ========== title-wrapper end ========== -->

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card-style settings-card-1 mb-30">

                <div class="
                    title
                    mb-30
                    d-flex
                    justify-content-between
                    align-items-center
                  ">
                    <h6>Agregar</h6>
                </div>
                <div class="profile-info">
                    <div class="input-style-1">
                        <label>Nombre<span class="required">*</span></label>
                        <input type="text"
                               ng-model="model.Name" />
                    </div>
                    <div class="input-style-1">
                        <label>Descripción</label>
                        <input type="text" ng-model="model.Description" />
                    </div>
                </div>

                <div class="col-12 col-sm-12">
                    <button class="main-btn primary-btn rounded-full btn-hover w-100" ng-click="Save()">
                        Agregar
                    </button>
                </div>

            </div>
            <!-- end card -->
        </div>
        <!-- end col -->

    </div>
    <!-- end row -->
</div>
