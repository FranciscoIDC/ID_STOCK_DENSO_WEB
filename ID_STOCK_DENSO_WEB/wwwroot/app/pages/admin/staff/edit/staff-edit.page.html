<div class="container-fluid">
    <!-- ========== title-wrapper start ========== -->
    <div class="title-wrapper pt-30">
        <div class="row align-items-center">
            <div class="col-md-6">
                <div class="titlemb-30">
                    <h2>Usuario</h2>
                </div>
            </div>
            <!-- end col -->
            <div class="col-md-6">
                <div class="breadcrumb-wrapper mb-30">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a onclick="history.back()" style="cursor:pointer;">Usuario</a></li>
                            <li class="breadcrumb-item active" aria-current="page" style="cursor:pointer;">
                                Editar
                            </li>
                        </ol>
                    </nav>
                </div>
            </div>
            <!-- end col -->
        </div>
        <!-- end row -->
    </div>
    <!-- ========== title-wrapper end ========== -->

    <div class="row justify-content-center">
        <div class="col-lg-6">

            <div class="card-style settings-card-1 mb-30">

                <div class="
                    title
                    mb-30
                    d-flex
                    justify-content-between
                    align-items-center
                  ">

                    <h6>Editar</h6>
                    <button class="border-0 bg-transparent" ng-click="ChangueMode()">
                        <i class="lni lni-pencil-alt"></i>
                    </button>
                </div>
                <div class="warning-alert p-0 " ng-if="!editMode">
                    <div class="alert p-0">
                        <p class=" text-center text-medium">Solo Lectura</p>
                    </div>
                </div>
                <div class="profile-info">
                    <!--<div class="row justify-content-center align-items-center mb-2">
        <img class="col col-sm-11 col-md-11 col-lg-11" ng-src="{{model.Image}}" onerror="this.onerror=null;this.src='/images/imageNotFound.png'" title="Imagen actual del activo" width="90%" height="90%" style="object-fit:contain" alt="">
    </div>-->
                    <div class="input-style-1">
                        <label>Nombre<span class="required">*</span></label>
                        <input type="text"
                               ng-model="model.Name" ng-disabled="!editMode" />
                    </div>
                    <div class="input-style-1">
                        <label>Apellido<span class="required">*</span></label>
                        <input type="text" ng-model="model.LastName" ng-disabled="!editMode" />
                    </div>
                    <div class="input-style-1">
                        <label>Email<span class="required">*</span></label>
                        <input type="text" ng-model="model.Email" ng-disabled="!editMode" />
                    </div>
                        <div class="row">
                            <div class="col-xxl-6">
                                <div class="col-12 form-check form-switch toggle-switch mb-4">
                                    <input class="form-check-input mr-10" style="width:20%;" type="checkbox" id="toggleSwitch3" ng-model="model.IsSystemUser" ng-disabled="!editMode">
                                    <label class="form-check-label" for="toggleSwitch3">¿Tiene Acceso a las Apps?</label>
                                </div>
                        </div>

                        <div ng-hide="!model.IsSystemUser">

                            <div class="row">
                                <div class="col-xxl-6">
                                    <div class="input-style-1">
                                        <label>Usuario<span class="required">*</span></label>
                                        <input type="text" ng-model="model.UserName" ng-disabled="!editMode" />
                                    </div>
                                </div>
                                <div class="col-xxl-6">
                                    <div class="input-style-1">
                                        <label>Contraseña<span class="required">*</span></label>
                                        <input type="password" ng-model="model.Password" ng-disabled="!editMode" />
                                    </div>
                                </div>
                            </div>


                            <div class="col-xxl-12">
                                <div class="select-style-1">
                                    <label>Rol<span class="required">*</span></label>
                                    <div class="select-position">
                                        <select class="light-bg" ng-model="IdRole" ng-disabled="!editMode">
                                            <option value="" disabled selected>Seleccionar Rol</option>
                                            <option ng-repeat="item in roles" value="{{item.Id}}">{{item.Name}}</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-12 col-sm-12 " ng-if="editMode">
                        <button class="main-btn primary-btn rounded-full btn-hover w-100" ng-click="Update()">
                            Actualizar
                        </button>
                    </div>

                </div>
        </div>
        <!-- end card -->
    </div>
    <!-- end col -->
    <!-- end row -->
</div>
