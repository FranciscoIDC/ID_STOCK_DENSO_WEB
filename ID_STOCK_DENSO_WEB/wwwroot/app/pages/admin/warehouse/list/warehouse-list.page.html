<div class="container-fluid">

    <!-- ========== Header ========== -->
    <br>
    <div class="catalog-header mb-4">
        <div class="row align-items-center">
            <div class="col-lg-8 col-md-6">
                <div class="header-content">
                    <div class="breadcrumb-custom mb-2">
                        <a ui-sref="home" class="breadcrumb-link">
                            <i class="lni lni-home"></i> Inicio
                        </a>
                        <span class="separator">/</span>
                        <span class="current">Almacenes</span>
                    </div>
                    <h2 class="page-title mb-2">
                        <i class="lni lni-apartment"></i> Almacenes
                    </h2>
                    <p class="page-subtitle text-muted mb-0">
                        Almacenes registrados en el sistema
                    </p>
                </div>
            </div>
            <div class="col-lg-4 col-md-6 text-end">
                <div class="stats-quick">
                    <div class="stat-item">
                        <div class="stat-icon bg-primary">
                            <i class="lni lni-database"></i>
                        </div>
                        <div class="stat-info">
                            <h4 class="mb-0">{{counterData}}</h4>
                            <small>Total registros</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== Filtros ========== -->
    <div class="card-style settings-card-1 mb-30">
        <div class="row g-3 align-items-end">
            <div class="col-lg-6 col-md-12">
                <div class="input-style-1">
                    <label><i class="lni lni-search-alt"></i> Buscar</label>
                    <input type="text"
                           ng-model="filterSearch"
                           placeholder="Nombre, descripción..."
                           ng-keypress="$event.keyCode === 13 && Search()" />
                </div>
            </div>

            <div class="col-lg-6 col-md-12 d-flex justify-content-end gap-2">
                <div class="col-xxl-auto text-center">
                    <div class="input-style-1">
                        <a class="main-btn primary-btn rounded-full btn-hover w-100"
                           style="text-decoration:none;"
                           ng-click="Search()">
                            <i class="lni lni-search"></i> Buscar
                        </a>
                    </div>
                </div>
                <div class="col-xxl-auto text-center">
                    <div class="input-style-1">
                        <a class="main-btn danger-btn rounded-full btn-hover w-100"
                           style="text-decoration:none;"
                           ng-click="ClearFilters()">
                            <i class="lni lni-brush-alt"></i> Limpiar
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== Tabla ========== -->
    <div class="card-style mb-30">
        <div class="d-flex justify-content-between align-items-center mb-20">
            <h6 class="mb-0"><i class="lni lni-list"></i> Listado de Almacenes</h6>
            <!--<div>
                <a class="main-btn primary-btn rounded-full btn-hover"
                   ui-sref="warehouse.add"
                   style="text-decoration:none;">
                    <i class="lni lni-plus"></i> Agregar Almacén
                </a>
            </div>-->
        </div>

        <div class="table-wrapper table-responsive">
            <table class="table table-striped table-hover align-middle">
                <thead>
                    <tr>
                        <th><h6><i class="lni lni-information"></i> Nombre</h6></th>
                        <th><h6><i class="lni lni-information"></i> Descripción</h6></th>
                        <th><h6><i class="lni lni-checkmark-circle"></i> Estatus</h6></th>
                        <th><h6><i class="lni lni-cogs"></i> Opciones</h6></th>
                    </tr>
                </thead>
                <tbody>
                    <tr ng-if="ExistData()" ng-repeat="item in data">
                        <td><p>{{DatumToString(item.Name)}}</p></td>
                        <td><p>{{DatumToString(item.Description)}}</p></td>
                        <td>
                            <span class="badge bg-success" ng-if="item.Status">
                                <i class="lni lni-checkmark"></i> Activo
                            </span>
                            <span class="badge bg-danger" ng-if="!item.Status">
                                <i class="lni lni-close"></i> Inactivo
                            </span>
                        </td>
                        <td>
                            <div class="action">
                                <!--<button class="text-warning" ng-click="GoEdit(item.Id)">
                                    <i class="lni lni-pencil"></i>
                                </button>
                                <div class="action">
                                    <button class="text-danger" ng-click="Remove(item.Id)">
                                        <i class="lni lni-trash-can"></i>
                                    </button>
                                </div>-->
                            </div>
                        </td>
                    </tr>
                    <tr ng-if="!ExistData()">
                        <td colspan="4">
                            <p class="text-center text-muted fs-5">
                                <i class="lni lni-warning"></i> Sin resultados
                            </p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Paginación -->
        <pagination-control show-items-per-page="true"
                            paging-size="pagingSize"
                            items-per-page="itemsPerPage"
                            total-items="totalItems"
                            display-items="displayItems"
                            current-page="currentPage">
        </pagination-control>
    </div>

</div>
