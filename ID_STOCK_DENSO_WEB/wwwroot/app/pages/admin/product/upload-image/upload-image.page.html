<div class="container-fluid">
    <div class="row justify-content-center align-items-center">
        <div class="col col-sm-6 col-md-5 col-lg-4">
            <img class="w-100" ng-src="{{imageRouteCurrent}}" title="Imagen actual del activo" width="60%" height="60%" style="object-fit:contain" alt="">
            <p class="text-center">Imagen actual</p>
        </div>
        <!--<p style="text-align:center;">Imagen actual</p>-->
        <div class="col col-sm-6 col-md-5 col-lg-4">
            <img class="w-100" ng-src="{{imageRouteToUpload}}" title="Imagen a subir del activo" width="60%" height="60%" style="object-fit:contain" alt="">
            <p class="text-center">Imagen a subir</p>
        </div>
        <!--<p style="text-align:center;">Imagen a Subir</p>-->

    </div>
    <div class="row justify-content-center mt-3">
        <div class="col-auto col-sm-auto">
            <div class="file-input ">
                <input type="file"
                       name="file-input"
                       id="file-input"
                       class="file-input__input"
                       ng-model="imageFile"
                       select-ng-files
                       onchange="angular.element(this).scope().SetFile(this)" />

                <label class="file-input__label" for="file-input">
                    <svg aria-hidden="true"
                         focusable="false"
                         data-prefix="fas"
                         data-icon="upload"
                         class="svg-inline--fa fa-upload fa-w-16"
                         role="img"
                         xmlns="http://www.w3.org/2000/svg"
                         viewBox="0 0 512 512">
                        <path fill="currentColor"
                              d="M296 384h-80c-13.3 0-24-10.7-24-24V192h-87.7c-17.8 0-26.7-21.5-14.1-34.1L242.3 5.7c7.5-7.5 19.8-7.5 27.3 0l152.2 152.2c12.6 12.6 3.7 34.1-14.1 34.1H320v168c0 13.3-10.7 24-24 24zm216-8v112c0 13.3-10.7 24-24 24H24c-13.3 0-24-10.7-24-24V376c0-13.3 10.7-24 24-24h136v8c0 30.9 25.1 56 56 56h80c30.9 0 56-25.1 56-56v-8h136c13.3 0 24 10.7 24 24zm-124 88c0-11-9-20-20-20s-20 9-20 20 9 20 20 20 20-9 20-20zm64 0c0-11-9-20-20-20s-20 9-20 20 9 20 20 20 20-9 20-20z"></path>
                    </svg>
                    <span>Seleccionar Imagen</span>
                </label>
            </div>
        </div>
    </div>


    <div class="action mt-3 d-flex flex-wrap justify-content-center">
        <button ng-click="GoBack()" class="main-btn primary-btn-outline square-btn btn-hover m-1">
            Salir
        </button>
        <button ng-click="UploadImage()" class="main-btn primary-btn-outline square-btn btn-hover m-1">
            Guardar
        </button>
    </div>
</div>
